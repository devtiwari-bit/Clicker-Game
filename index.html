<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ved Clicker Arena</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0f0f0f,#000);
  color:white;
  text-align:center;
}

/* GLASS CARD UI */
.box{
  width:360px;
  margin:60px auto;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow:0 0 30px rgba(0,255,255,0.15);
  border:1px solid rgba(0,255,255,0.2);
}

/* TITLE */
h1{
  color:#00f7ff;
  text-shadow:0 0 10px #00f7ff;
}

/* BUTTONS */
button{
  padding:12px 18px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.9);
}

/* GAME BUTTON */
#clickBtn{
  background:linear-gradient(45deg,#00f7ff,#0066ff);
  color:white;
  font-weight:bold;
  box-shadow:0 0 15px #00f7ff;
}

/* START BUTTON */
#startBtn{
  background:linear-gradient(45deg,#ff00cc,#3333ff);
  color:white;
}

/* FLOAT ANIMATION */
.float{
  position:absolute;
  color:#00f7ff;
  font-weight:bold;
  animation:floatUp 1s linear forwards;
  pointer-events:none;
}

@keyframes floatUp{
  from{opacity:1; transform:translateY(0);}
  to{opacity:0; transform:translateY(-80px);}
}

/* TIMER */
.timer{
  font-size:22px;
  color:#ffcc00;
  text-shadow:0 0 10px #ffcc00;
}

/* RANK */
.rank{
  margin-top:10px;
  font-size:18px;
  color:#00ff88;
}
</style>
</head>

<body>

<div class="box">
  <h1>VED CLICKER ARENA</h1>

  <div class="timer">Time: <span id="time">10</span>s</div>

  <h2>Score: <span id="score">0</span></h2>

  <button id="startBtn" onclick="startGame()">START</button>
  <button id="clickBtn" onclick="clickGame(event)" disabled>CLICK</button>

  <h3>Clicks/sec: <span id="cps">0</span></h3>

  <div class="rank">Rank: <span id="rank">Not Started</span></div>

  <h3>Result CPS: <span id="finalCps">-</span></h3>
</div>

<script>
let score = 0;
let time = 10;
let running = false;
let clicks = 0;
let interval;

/* START GAME */
function startGame(){
  score = 0;
  time = 10;
  clicks = 0;
  running = true;

  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = time;
  document.getElementById("rank").innerText = "Playing...";
  document.getElementById("finalCps").innerText = "-";

  document.getElementById("clickBtn").disabled = false;

  interval = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      endGame();
    }
  },1000);
}

/* CLICK */
function clickGame(e){
  if(!running) return;

  score++;
  clicks++;

  document.getElementById("score").innerText = score;

  // floating effect
  let f = document.createElement("div");
  f.className = "float";
  f.innerText = "+1";
  f.style.left = e.pageX + "px";
  f.style.top = e.pageY + "px";
  document.body.appendChild(f);

  setTimeout(()=>f.remove(),1000);
}

/* END GAME */
function endGame(){
  running = false;
  clearInterval(interval);
  document.getElementById("clickBtn").disabled = true;

  let cps = (clicks / 10).toFixed(2);
  document.getElementById("finalCps").innerText = cps;

  document.getElementById("rank").innerText = getRank(cps);
}

/* RANK SYSTEM */
function getRank(cps){
  if(cps < 2) return "🥉 Rookie Clicker";
  if(cps < 4) return "🥈 Pro Clicker";
  if(cps < 6) return "🥇 Elite Clicker";
  if(cps < 8) return "🔥 Hardcore Gamer";
  return "👑 LEGEND CLICKER";
}
</script>

</body>
</html>
