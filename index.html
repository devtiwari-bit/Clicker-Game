<style>

html, body {
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  overflow-x:hidden;

  /* FIX DOUBLE TAP ZOOM */
  touch-action: manipulation;

  font-family:Arial;
  background:radial-gradient(circle at top,#0b0f1a,#000);
  color:white;
  text-align:center;
}

/* MAIN CARD */
.box{
  width:90%;
  max-width:360px;
  margin:60px auto;
  padding:25px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,180,255,0.25);
  box-shadow:0 0 25px rgba(0,180,255,0.15);
  backdrop-filter:blur(10px);
  box-sizing:border-box;
}

/* TITLE */
h1{
  color:#00c8ff;
  text-shadow:0 0 10px #00c8ff;
  margin-bottom:5px;
}

/* SLOGAN */
#slogan{
  color:#aaa;
  font-size:13px;
  height:20px;
  margin-bottom:15px;
}

/* TIMER */
.timer{
  font-size:20px;
  color:#ffcc00;
  text-shadow:0 0 10px #ffcc00;
}

/* BUTTONS */
button{
  padding:12px 18px;
  margin:10px;
  font-size:15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.9);
}

/* START */
#startBtn{
  background:linear-gradient(45deg,#00c8ff,#0066ff);
  color:white;
}

/* CLICK */
#clickBtn{
  background:linear-gradient(45deg,#00ffcc,#0099ff);
  color:black;
  font-weight:bold;
  box-shadow:0 0 12px #00ffcc;
}

/* FLOAT */
.float{
  position:absolute;
  color:#00c8ff;
  font-weight:bold;
  animation:floatUp 1s linear forwards;
  pointer-events:none;
}

@keyframes floatUp{
  from{opacity:1; transform:translateY(0);}
  to{opacity:0; transform:translateY(-80px);}
}

/* RANK */
.rank{
  margin-top:10px;
  color:#00ff99;
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:12px;
  color:white;
  opacity:0.8;
}

</style>

<body>

<div class="box">

  <h1>Clicker Arena</h1>

  <div id="slogan">Ready to become a legend?</div>

  <div class="timer">Time: <span id="time">10</span>s</div>

  <h2>Score: <span id="score">0</span></h2>

  <button id="startBtn" onclick="startGame()">START</button>
  <button id="clickBtn" onclick="clickGame(event)" disabled>CLICK</button>

  <h3>Clicks/sec: <span id="cps">0</span></h3>

  <div class="rank">Rank: <span id="rank">Not Started</span></div>

  <h3>Result CPS: <span id="finalCps">-</span></h3>

  <div class="footer">@VedGames Production</div>

</div>

<script>

let score=0;
let time=10;
let clicks=0;
let running=false;
let interval;

/* SLOGANS */
let slogans=[
"Ready to become a legend?",
"Tap faster than your limits!",
"Every click builds your power!",
"Only pros survive the arena!",
"Speed is everything!"
];

let sloganIndex=0;

setInterval(()=>{
  sloganIndex=(sloganIndex+1)%slogans.length;
  document.getElementById("slogan").innerText=slogans[sloganIndex];
},2000);

/* START GAME */
function startGame(){
  score=0;
  time=10;
  clicks=0;
  running=true;

  document.getElementById("score").innerText=0;
  document.getElementById("time").innerText=10;
  document.getElementById("rank").innerText="Playing...";
  document.getElementById("finalCps").innerText="-";

  document.getElementById("clickBtn").disabled=false;

  interval=setInterval(()=>{
    time--;
    document.getElementById("time").innerText=time;

    if(time<=0){
      endGame();
    }
  },1000);
}

/* CLICK */
function clickGame(e){
  if(!running) return;

  score++;
  clicks++;

  document.getElementById("score").innerText=score;

  let f=document.createElement("div");
  f.className="float";
  f.innerText="+1";
  f.style.left=e.pageX+"px";
  f.style.top=e.pageY+"px";
  document.body.appendChild(f);

  setTimeout(()=>f.remove(),1000);
}

/* END */
function endGame(){
  running=false;
  clearInterval(interval);
  document.getElementById("clickBtn").disabled=true;

  let cps=(clicks/10).toFixed(2);
  document.getElementById("finalCps").innerText=cps;

  document.getElementById("rank").innerText=getRank(cps);
}

/* RANK */
function getRank(cps){
  if(cps<2) return "🥉 Rookie";
  if(cps<4) return "🥈 Pro";
  if(cps<6) return "🥇 Elite";
  if(cps<8) return "🔥 Hardcore";
  return "👑 Legend";
}

</script>

</body>
